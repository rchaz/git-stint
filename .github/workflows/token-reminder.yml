name: NPM token expiration reminder

# Token was created ~Feb 2026 with 90-day expiry (~May 2026).
# This runs monthly and creates an issue 2 weeks before estimated expiry.
# Delete this workflow after switching to OIDC trusted publishing.

on:
  schedule:
    - cron: "0 9 1 * *" # 9am UTC on the 1st of each month
  workflow_dispatch: # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check if token is near expiry
        run: |
          # Estimated expiry: May 27, 2026 (90 days from ~Feb 26)
          EXPIRY="2026-05-27"
          WARN_DATE=$(date -d "$EXPIRY - 14 days" +%Y-%m-%d 2>/dev/null || date -v-14d -j -f "%Y-%m-%d" "$EXPIRY" +%Y-%m-%d)
          TODAY=$(date +%Y-%m-%d)

          if [[ "$TODAY" > "$WARN_DATE" || "$TODAY" == "$WARN_DATE" ]]; then
            echo "TOKEN_EXPIRING=true" >> "$GITHUB_ENV"
          fi

      - name: Create reminder issue
        if: env.TOKEN_EXPIRING == 'true'
        run: |
          gh issue create \
            --title "NPM_TOKEN expires soon — rotate or switch to OIDC" \
            --body "$(cat <<'EOF'
          The NPM_TOKEN secret used for publishing expires around **May 27, 2026**.

          ## Options

          ### Option 1: Rotate the token
          1. Go to [npmjs.com](https://www.npmjs.com) → Access Tokens → Generate New Token
          2. Update the GitHub secret: Settings → Secrets → `NPM_TOKEN`

          ### Option 2: Switch to OIDC trusted publishing (recommended)
          No tokens needed — never expires.
          1. On npmjs.com: package settings → Trusted Publisher → GitHub Actions
          2. Set: org=`rchaz`, repo=`git-stint`, workflow=`publish.yml`
          3. Remove `NODE_AUTH_TOKEN` env from `.github/workflows/publish.yml`
          4. Delete `.github/workflows/token-reminder.yml`

          See: https://docs.npmjs.com/trusted-publishers/
          EOF
          )" \
            --label "maintenance"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
