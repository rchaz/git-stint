name: Publish to npm

on:
  push:
    tags:
      - "v*"

# OIDC trusted publishing — no tokens needed, never expires.
# Configured on npmjs.com: git-stint → Settings → Trusted Publisher → GitHub Actions
# See: https://docs.npmjs.com/trusted-publishers/

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:all

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Debug OIDC environment
        run: |
          echo "npm version: $(npm -v)"
          echo "node version: $(node -v)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "NODE_AUTH_TOKEN set: ${NODE_AUTH_TOKEN:+yes}"
          echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG:-not set}"
          cat ~/.npmrc 2>/dev/null || echo "No ~/.npmrc"
          npm config list 2>/dev/null || true
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: "true"
