name: Bug Report
description: Report a bug in git-stint
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Duplicate Check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Session commands (start, commit, squash, end...)
        - Worktree management
        - Claude Code hooks
        - Testing (test, test --combine)
        - Conflict detection
        - PR creation
        - Prune / cleanup
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS 15.3, Ubuntu 24.04, etc.
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: "Node 22.x, git 2.45, git-stint 0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. git stint start my-session
        2. cd .stint/my-session
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
      placeholder: Paste any error output here
