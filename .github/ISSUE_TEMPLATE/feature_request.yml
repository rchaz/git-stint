name: Feature Request
description: Suggest a feature for git-stint
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Duplicate Check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: How should it work? CLI examples, expected behavior, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Session commands
        - Claude Code integration
        - Testing
        - Other editor/agent integration
        - Documentation
        - Other
    validations:
      required: true
